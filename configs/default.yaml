# Neuromorphic Robot SNN - Default Configuration
# This file can be modified and used with: python main_enhanced.py --config configs/default.yaml

data:
  num_sensors: 9
  n_train_tracks: 30
  n_test_tracks: 12
  samples_per_track: 450
  lookahead: 0.85
  sensor_arc_deg: 90.0
  track_y_max: 40.0
  line_sigma: 0.28
  cache_dataset: true
  dataset_cache_dir: "cache/datasets"

model:
  input_dim: 9
  hidden_dim: 96
  output_dim: 3
  beta: 0.92
  snn_steps: 25
  dropout: 0.0
  use_batch_norm: false

train:
  batch_size: 96
  ann_epochs: 18
  snn_epochs: 18
  lr: 0.001
  lr_scheduler: "none"
  lr_patience: 5
  lr_step_size: 10
  lr_gamma: 0.5
  weight_decay: 0.0
  gradient_clip: 1.0
  checkpoint_dir: "outputs/checkpoints"
  save_best_only: true
  early_stopping_patience: 10
  mixed_precision: false
  seed: 13

sim:
  speed: 0.16
  turn_rate: 0.11
  max_steps: 340
  failure_distance: 1.55
  delay_steps: 0
  noise_std: 0.0
  sensor_dropout_prob: 0.0
  dead_sensor_index: -1
  actuator_noise: 0.01

encoding:
  encoding_type: "rate"
  population_num_neurons: 5
  latency_time_window: 25
  threshold: 0.5

experiment:
  output_dir: "outputs"
  experiment_name: null  # Auto-generated if null
  use_wandb: false
  wandb_project: "neuromorphic-robot-snn"
  wandb_entity: null
  log_level: "INFO"
  save_plots: true
  save_animations: true
  save_trajectories: false
  seed: 13
