# Population Coding Experiment
# Test distributed representation with multiple neurons per feature

model:
  hidden_dim: 128
  dropout: 0.1
  beta: 0.92

train:
  ann_epochs: 25
  snn_epochs: 30
  batch_size: 96
  lr: 0.001
  lr_scheduler: "plateau"
  lr_patience: 5
  gradient_clip: 1.0
  early_stopping_patience: 8

encoding:
  encoding_type: "population"
  population_num_neurons: 10
  threshold: 0.5
  snn_steps: 30  # Longer for population coding

data:
  num_sensors: 9
  n_train_tracks: 30
  n_test_tracks: 12
  samples_per_track: 450

experiment:
  experiment_name: "population_coding_10neurons"
  log_level: "INFO"
  use_wandb: false
  save_plots: true
  save_animations: false
